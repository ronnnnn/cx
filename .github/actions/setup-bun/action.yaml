name: Set up bun
description: Set up bun environment and install dependencies

runs:
  using: 'composite'
  steps:
    - name: Setup Bun
      uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      with:
        bun-version-file: .tool-versions

    - name: Bun Install
      shell: bash
      run: bun i --frozen-lockfile --ignore-scripts
